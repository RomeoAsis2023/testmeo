<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>circlenode · social profile with webtorrent & yjs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f2f5 0%, #e6ecf4 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 24px 20px;
            color: #1e2a3e;
        }
        .circlenode-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .profile-card {
            flex: 1.2;
            min-width: 280px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .feed-panel {
            flex: 2.8;
            min-width: 320px;
            background: #ffffffdd;
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }
        .avatar-wrapper { text-align: center; margin-bottom: 1.5rem; }
        .avatar-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 12px 22px -8px rgba(0,0,0,0.3);
            background: #cbd5e1;
        }
        .avatar-upload-btn {
            margin-top: 12px;
            background: #2c3e66;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .avatar-upload-btn:hover { background: #1e2b46; }
        .file-input-hidden { display: none; }
        .about-section {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin: 1rem 0;
        }
        .about-text {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            resize: vertical;
            font-family: inherit;
            padding: 0.5rem;
            outline: none;
        }
        .section-title {
            font-weight: 700;
            font-size: 1.2rem;
            border-left: 5px solid #3b82f6;
            padding-left: 12px;
            margin-bottom: 1rem;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: #eef2ff;
            border-radius: 2rem;
            padding: 12px;
            margin: 1rem 0;
            font-weight: 600;
        }
        .stat { text-align: center; }
        .tabs {
            display: flex;
            gap: 12px;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            color: #334155;
        }
        .tab-btn.active {
            background: #3b82f6;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active-tab { display: block; }
        .feed-item {
            background: white;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
        }
        .feed-text { font-size: 0.95rem; margin-bottom: 0.4rem; }
        .feed-time { font-size: 0.7rem; color: #6c757d; }
        .post-input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 1.2rem;
            background: white;
            padding: 0.8rem;
            border-radius: 2rem;
        }
        .post-input {
            flex: 1;
            border: none;
            background: #f1f5f9;
            padding: 12px 18px;
            border-radius: 2rem;
            outline: none;
        }
        .post-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        .media-card {
            background: #f1f5f9;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
        }
        .media-card img, .media-card video {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }
        .upload-media {
            margin-top: 1rem;
            background: #eef2ff;
            border-radius: 2rem;
            padding: 12px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .upload-label {
            background: #475569;
            color: white;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }
        .upload-label:hover { background: #334155; }
        i { margin-right: 6px; }
        footer { text-align: center; margin-top: 30px; font-size: 0.75rem; opacity: 0.7; }
        button { cursor: pointer; }
        .status-badge {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
            padding: 4px;
            border-radius: 20px;
        }
        .status-badge.connected { color: #10b981; background: #d1fae5; }
        .status-badge.connecting { color: #f59e0b; background: #fed7aa; }
    </style>
</head>
<body>
<div class="circlenode-container">
    <div class="profile-card">
        <div class="avatar-wrapper">
            <img id="profileAvatar" class="avatar-img" src="https://ui-avatars.com/api/?background=3b82f6&color=fff&rounded=true&size=140&name=C+Node" alt="avatar">
            <div>
                <button id="uploadAvatarBtn" class="avatar-upload-btn"><i class="fas fa-camera"></i> Upload avatar</button>
                <input type="file" id="avatarFileInput" accept="image/*" class="file-input-hidden">
            </div>
            <h2 style="margin-top: 16px;">circlenode</h2>
            <p style="color:#475569"><i class="fas fa-globe"></i> decentralized · yjs + webtorrent</p>
        </div>
        <div class="stats-row">
            <div class="stat"><i class="fas fa-newspaper"></i> <span id="postCount">0</span></div>
            <div class="stat"><i class="fas fa-image"></i> <span id="photoCount">0</span></div>
            <div class="stat"><i class="fas fa-video"></i> <span id="videoCount">0</span></div>
        </div>
        <div class="about-section">
            <div class="section-title"><i class="fas fa-user-astronaut"></i> About Me</div>
            <textarea id="aboutMeInput" class="about-text" rows="3" placeholder="Write something about yourself..."></textarea>
        </div>
        <div class="status-badge connecting" id="syncStatus">
            <i class="fas fa-sync-alt fa-spin"></i> Connecting...
        </div>
    </div>
    <div class="feed-panel">
        <div class="tabs">
            <button class="tab-btn active" data-tab="wall"><i class="fas fa-th-list"></i> Wall</button>
            <button class="tab-btn" data-tab="photos"><i class="fas fa-images"></i> Photos</button>
            <button class="tab-btn" data-tab="videos"><i class="fas fa-video"></i> Videos</button>
        </div>
        <div id="wallTab" class="tab-content active-tab">
            <div class="post-input-area">
                <input type="text" id="newPostText" class="post-input" placeholder="What's on your mind? 🌟">
                <button id="publishPostBtn" class="post-btn"><i class="fas fa-paper-plane"></i> Post</button>
            </div>
            <div id="wallFeedContainer" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
        <div id="photosTab" class="tab-content">
            <div class="upload-media">
                <span class="upload-label" id="uploadPhotoLabel"><i class="fas fa-upload"></i> Upload Photo</span>
                <input type="file" id="photoFileInput" accept="image/*" style="display:none">
            </div>
            <div id="photosGrid" class="media-grid"></div>
        </div>
        <div id="videosTab" class="tab-content">
            <div class="upload-media">
                <span class="upload-label" id="uploadVideoLabel"><i class="fas fa-file-video"></i> Upload Video</span>
                <input type="file" id="videoFileInput" accept="video/mp4,video/webm" style="display:none">
                <button id="testSampleVideoBtn" class="upload-label" style="background:#6b21a5;">🎬 Sample</button>
            </div>
            <div id="videoList" class="media-grid"></div>
            <div id="streamingPlayer" style="margin-top: 20px; display: none;">
                <div class="section-title"><i class="fas fa-play-circle"></i> Now Streaming</div>
                <video id="torrentVideoPlayer" controls style="width:100%; border-radius: 1rem; background:#000;"></video>
            </div>
        </div>
    </div>
</div>
<footer>⚡ circlenode — real‑time wall & media via Yjs · WebTorrent P2P streaming</footer>

<!-- Load everything as ES modules - NO GLOBAL SCRIPTS for Yjs -->
<script type="module">
    // Import directly - this is the ONLY place Yjs is loaded
    import * as Y from 'https://cdn.jsdelivr.net/npm/yjs@13.6.30/+esm';
    import { WebsocketProvider } from 'https://cdn.jsdelivr.net/npm/y-websocket@3.0.0/+esm';
    
    // Load WebTorrent dynamically (it doesn't conflict with Yjs)
    const webtorrentModule = await import('https://cdn.jsdelivr.net/npm/webtorrent@2.0.0/webtorrent.min.js');
    const WebTorrent = webtorrentModule.default || window.WebTorrent;
    
    console.log('✅ Yjs and WebTorrent loaded as ES modules');
    
    // Initialize Yjs
    const ydoc = new Y.Doc();
    const provider = new WebsocketProvider('wss://demos.yjs.dev', 'circlenode-room', ydoc);
    
    // Shared data
    const yPosts = ydoc.getArray('wall_posts');
    const yPhotos = ydoc.getArray('photos');
    const yVideos = ydoc.getArray('videos');
    const yAbout = ydoc.getText('about_me');
    const yAvatar = ydoc.getText('avatar_data');
    
    // DOM elements
    const aboutTextarea = document.getElementById('aboutMeInput');
    const avatarImg = document.getElementById('profileAvatar');
    const postCountSpan = document.getElementById('postCount');
    const photoCountSpan = document.getElementById('photoCount');
    const videoCountSpan = document.getElementById('videoCount');
    const wallContainer = document.getElementById('wallFeedContainer');
    const photosGrid = document.getElementById('photosGrid');
    const videoListDiv = document.getElementById('videoList');
    const streamingPlayerDiv = document.getElementById('streamingPlayer');
    const torrentVideoPlayer = document.getElementById('torrentVideoPlayer');
    const syncStatus = document.getElementById('syncStatus');
    
    let webtorrentClient = null;
    if (WebTorrent) {
        webtorrentClient = new WebTorrent();
        console.log('✅ WebTorrent client ready');
    }
    
    function updateStats() {
        postCountSpan.innerText = yPosts.length;
        photoCountSpan.innerText = yPhotos.length;
        videoCountSpan.innerText = yVideos.length;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    function renderWall() {
        if (!wallContainer) return;
        wallContainer.innerHTML = '';
        const posts = yPosts.toArray().slice().reverse();
        if (posts.length === 0) {
            wallContainer.innerHTML = '<div style="text-align:center;padding:2rem">💬 No posts yet</div>';
            return;
        }
        posts.forEach(post => {
            const div = document.createElement('div');
            div.className = 'feed-item';
            div.innerHTML = `
                <div class="feed-text">👤 ${escapeHtml(post.text)}</div>
                <div class="feed-time">📅 ${new Date(post.timestamp).toLocaleString()}</div>
            `;
            wallContainer.appendChild(div);
        });
        updateStats();
    }
    
    function renderPhotos() {
        if (!photosGrid) return;
        photosGrid.innerHTML = '';
        const photos = yPhotos.toArray();
        if (photos.length === 0) {
            photosGrid.innerHTML = '<div style="text-align:center;padding:2rem">📷 No photos yet</div>';
            return;
        }
        photos.forEach(photo => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.innerHTML = `
                <img src="${photo.preview || 'https://placehold.co/200x150'}" alt="photo">
                <div style="padding:6px;font-size:0.7rem">${escapeHtml(photo.name)}</div>
            `;
            if (photo.magnet && webtorrentClient) {
                card.onclick = () => {
                    webtorrentClient.add(photo.magnet, (torrent) => {
                        torrent.files[0].getBlobURL((err, url) => {
                            if (!err && card.querySelector('img')) card.querySelector('img').src = url;
                        });
                    });
                };
            }
            photosGrid.appendChild(card);
        });
        updateStats();
    }
    
    function renderVideos() {
        if (!videoListDiv) return;
        videoListDiv.innerHTML = '';
        const videos = yVideos.toArray();
        if (videos.length === 0) {
            videoListDiv.innerHTML = '<div style="text-align:center;padding:2rem">🎥 No videos yet</div>';
            return;
        }
        videos.forEach(video => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.style.cursor = 'pointer';
            card.innerHTML = `
                <video poster="https://placehold.co/200x150?text=video" style="width:100%; height:130px; object-fit:cover;"></video>
                <div style="padding:6px">📀 ${escapeHtml(video.name)}</div>
            `;
            if (video.magnet && webtorrentClient) {
                card.onclick = () => {
                    streamingPlayerDiv.style.display = 'block';
                    webtorrentClient.add(video.magnet, (torrent) => {
                        const videoFile = torrent.files.find(f => /\.(mp4|webm)/i.test(f.name)) || torrent.files[0];
                        if (videoFile) videoFile.renderTo(torrentVideoPlayer, { autoplay: true });
                    });
                };
            }
            videoListDiv.appendChild(card);
        });
        updateStats();
    }
    
    function seedFile(file, type, callback) {
        if (!webtorrentClient) return;
        webtorrentClient.seed(file, (torrent) => {
            callback(torrent.magnetURI, type === 'photo' ? URL.createObjectURL(file) : null, file.name);
        });
    }
    
    // Yjs observers
    yPosts.observe(() => { renderWall(); updateStats(); });
    yPhotos.observe(() => { renderPhotos(); updateStats(); });
    yVideos.observe(() => { renderVideos(); updateStats(); });
    
    yAbout.observe(() => {
        if (aboutTextarea && aboutTextarea.value !== yAbout.toString()) {
            aboutTextarea.value = yAbout.toString();
        }
    });
    
    yAvatar.observe(() => {
        const data = yAvatar.toString();
        if (data && data.startsWith('data:')) avatarImg.src = data;
        else if (data) avatarImg.src = data;
    });
    
    if (aboutTextarea) {
        aboutTextarea.addEventListener('input', (e) => {
            yAbout.delete(0, yAbout.length);
            yAbout.insert(0, e.target.value);
        });
    }
    
    provider.on('status', event => {
        console.log('Status:', event.status);
        if (syncStatus) {
            syncStatus.className = 'status-badge ' + event.status;
            if (event.status === 'connected') {
                syncStatus.innerHTML = '<i class="fas fa-check-circle"></i> Live sync active';
            } else {
                syncStatus.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Connecting...';
            }
        }
    });
    
    // Event listeners
    document.getElementById('publishPostBtn')?.addEventListener('click', () => {
        const text = document.getElementById('newPostText')?.value.trim();
        if (text) {
            yPosts.push([{ text, timestamp: Date.now() }]);
            document.getElementById('newPostText').value = '';
        }
    });
    
    document.getElementById('uploadAvatarBtn')?.addEventListener('click', () => {
        document.getElementById('avatarFileInput')?.click();
    });
    
    document.getElementById('avatarFileInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                yAvatar.delete(0, yAvatar.length);
                yAvatar.insert(0, ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    });
    
    document.getElementById('uploadPhotoLabel')?.addEventListener('click', () => {
        document.getElementById('photoFileInput')?.click();
    });
    
    document.getElementById('photoFileInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            seedFile(file, 'photo', (magnet, preview, name) => {
                yPhotos.push([{ name, magnet, preview }]);
            });
        }
        e.target.value = '';
    });
    
    document.getElementById('uploadVideoLabel')?.addEventListener('click', () => {
        document.getElementById('videoFileInput')?.click();
    });
    
    document.getElementById('videoFileInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            seedFile(file, 'video', (magnet, _, name) => {
                yVideos.push([{ name, magnet }]);
            });
        }
        e.target.value = '';
    });
    
    document.getElementById('testSampleVideoBtn')?.addEventListener('click', () => {
        const sampleMagnet = 'magnet:?xt=urn:btih:08ada5a7a6183aae1e09d831df6748d566095a10&dn=Sintel&tr=udp://tracker.opentrackr.org:1337';
        if (!yVideos.toArray().find(v => v.name === 'Sintel')) {
            yVideos.push([{ name: 'Sintel (Sample)', magnet: sampleMagnet }]);
        }
    });
    
    // Tab switching
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(`${tabId}Tab`)?.classList.add('active-tab');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`)?.classList.add('active');
    }
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    
    // Initialize
    if (yAbout.length === 0) yAbout.insert(0, 'Building the decentralized web! 🌐');
    if (yAvatar.length === 0) yAvatar.insert(0, 'https://ui-avatars.com/api/?background=3b82f6&color=fff&size=140&name=CN');
    
    renderWall();
    renderPhotos();
    renderVideos();
    updateStats();
    
    if (yPosts.length === 0) {
        setTimeout(() => {
            yPosts.push([{ text: 'Welcome to circlenode! Real-time P2P social network', timestamp: Date.now() }]);
        }, 500);
    }
    
    console.log('🚀 circlenode ready - single Yjs instance');
</script>
</body>
</html>
