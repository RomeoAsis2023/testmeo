<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Circles - Decentralized Profile App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .alert-info { background: #e3f2fd; color: #1976d2; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
        .alert-error { background: #ffebee; color: #c62828; }
        .circle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .content-item {
            border-top: 1px solid #eee;
            margin-top: 15px;
            padding-top: 15px;
        }
        .content-title {
            font-weight: bold;
            font-size: 16px;
        }
        .content-meta {
            font-size: 12px;
            color: #666;
            margin: 5px 0;
        }
        .content-body {
            color: #555;
            margin-top: 8px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-public { background: #4caf50; color: white; }
        .badge-circle { background: #2196f3; color: white; }
        .badge-private { background: #999; color: white; }
        .badge-view { background: #667eea; color: white; }
        .badge-comment { background: #ff9800; color: white; }
        .badge-admin { background: #f44336; color: white; }
        .peer-id {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }
        .hidden { display: none; }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .stat {
            background: #f5f5f5;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; }
        h3 { margin-bottom: 15px; color: #333; }
        h4 { margin: 20px 0 10px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status" class="alert alert-info">Initializing P2P Network...</div>
        
        <!-- Profile Section -->
        <div id="profileSection" class="card hidden">
            <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px;">
                    👤
                </div>
                <div style="flex: 1;">
                    <h2 id="profileName" style="margin-bottom: 5px;">Loading...</h2>
                    <div class="peer-id" id="profilePeerId"></div>
                </div>
                <button onclick="editProfile()">Edit Profile ✏️</button>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="circleCount">0</div>
                    <div class="stat-label">Circle Members</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="contentCount">0</div>
                    <div class="stat-label">My Posts</div>
                </div>
            </div>
        </div>
        
        <!-- My Circle Section -->
        <div class="card">
            <h3>👥 My Circle</h3>
            <div id="circleList" style="margin-bottom: 20px;">
                <p style="color: #999;">No connections yet</p>
            </div>
            
            <h4>Add New Connection</h4>
            <input type="text" id="peerId" placeholder="Peer ID (from another user's profile)" />
            <select id="permissionLevel">
                <option value="view">👁️ View Only</option>
                <option value="comment">💬 Can Comment</option>
                <option value="admin">👑 Admin</option>
            </select>
            <button onclick="addToCircle()" style="width: 100%;">Add to Circle ➕</button>
        </div>
        
        <!-- Share Content Section -->
        <div class="card">
            <h3>📝 Share a Post</h3>
            <input type="text" id="postTitle" placeholder="Title" />
            <textarea id="postContent" rows="3" placeholder="What's on your mind?"></textarea>
            <select id="shareWith">
                <option value="public">🌍 Public - Everyone can see</option>
                <option value="circle">👥 My Circle Only</option>
                <option value="private">🔒 Only Me</option>
            </select>
            <button onclick="shareContent()" style="width: 100%;">Share Post 📤</button>
            <div id="contentList" style="margin-top: 20px;"></div>
        </div>
        
        <!-- Online Peers Section -->
        <div class="card">
            <h3>🌐 Discover Peers</h3>
            <div id="peerList">
                <p style="color: #999;">Discovering peers on the network...</p>
            </div>
            <p style="font-size: 12px; color: #666; margin-top: 10px;">
                💡 Tip: Open this page in another browser window or on another device to see P2P sync in action!
            </p>
        </div>
    </div>

    <script type="module">
        // Import GenosDB - the CORRECT way using ES module import
        import { gdb } from "https://cdn.jsdelivr.net/npm/genosdb@latest/dist/index.min.js";
        
        // Global state
        let db = null;
        let currentUser = null;
        let currentPeerId = null;
        let allPeers = new Map(); // Store discovered peers
        
        // Helper: Update status message
        function updateStatus(message, type) {
            const statusEl = document.getElementById("status");
            statusEl.className = `alert alert-${type}`;
            statusEl.innerHTML = message;
            statusEl.style.display = "block";
            console.log(`[${type.toUpperCase()}] ${message}`);
            
            setTimeout(() => {
                if (statusEl.innerHTML === message) {
                    statusEl.style.display = "none";
                }
            }, 5000);
        }
        
        // Helper: Get current peer ID from GenosDB
        // Based on the whiteboard example which uses db.room and peer identification [citation:3]
        function getCurrentPeerId() {
            // In GenosDB, the peer ID is accessible through the room or connection
            if (db && db.room && db.room.id) {
                return db.room.id;
            }
            // Fallback: generate a short ID from the connection
            return `peer_${Math.random().toString(36).substring(2, 10)}`;
        }
        
        // Get or create user profile in the database
        async function getOrCreateProfile(peerId) {
            const profileKey = `profile_${peerId}`;
            
            try {
                // Try to get existing profile
                let profile = await db.get(profileKey);
                
                if (!profile) {
                    // Create new profile
                    profile = {
                        id: profileKey,
                        peerId: peerId,
                        name: `User_${peerId.slice(-6)}`,
                        bio: "Building my decentralized circle",
                        circle: [],      // Array of { peerId, permissions, addedAt }
                        content: [],     // Array of content IDs
                        createdAt: new Date().toISOString(),
                        lastSeen: new Date().toISOString()
                    };
                    await db.put(profile);
                    updateStatus(`✨ Profile created! Your ID: ${peerId.slice(0, 12)}...`, "success");
                }
                
                return profile;
            } catch (error) {
                console.error("Error getting/creating profile:", error);
                throw error;
            }
        }
        
        // Update the UI with current user data
        async function updateUI() {
            if (!currentUser) return;
            
            document.getElementById("profileSection").classList.remove("hidden");
            document.getElementById("profileName").innerText = currentUser.name || "P2P User";
            document.getElementById("profilePeerId").innerText = currentPeerId || "Loading...";
            document.getElementById("circleCount").innerText = (currentUser.circle || []).length;
            document.getElementById("contentCount").innerText = (currentUser.content || []).length;
            
            await updateCircleList();
            await updateContentList();
        }
        
        // Update the circle members list in UI
        async function updateCircleList() {
            const container = document.getElementById("circleList");
            const members = currentUser?.circle || [];
            
            if (members.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">✨ No connections yet. Add your first peer above!</p>';
                return;
            }
            
            // Fetch each member's profile to display their name
            let membersHtml = '';
            for (const member of members) {
                let memberName = member.peerId.slice(0, 12) + '...';
                try {
                    const memberProfile = await db.get(`profile_${member.peerId}`);
                    if (memberProfile && memberProfile.name) {
                        memberName = memberProfile.name;
                    }
                } catch (e) {
                    // Use peer ID as fallback
                }
                
                const badgeClass = member.permissions === 'admin' ? 'badge-admin' : 
                                  (member.permissions === 'comment' ? 'badge-comment' : 'badge-view');
                const badgeLabel = member.permissions === 'admin' ? '👑 Admin' :
                                  (member.permissions === 'comment' ? '💬 Comment' : '👁️ View');
                
                membersHtml += `
                    <div class="circle-item">
                        <div>
                            <strong>${escapeHtml(memberName)}</strong>
                            <div class="peer-id" style="font-size: 11px;">${member.peerId.slice(0, 16)}...</div>
                        </div>
                        <span class="badge ${badgeClass}">${badgeLabel}</span>
                    </div>
                `;
            }
            container.innerHTML = membersHtml;
        }
        
        // Update the content/posts list in UI
        async function updateContentList() {
            const container = document.getElementById("contentList");
            const contentIds = currentUser?.content || [];
            
            if (contentIds.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">📝 No posts yet. Share something above!</p>';
                return;
            }
            
            let contentHtml = '';
            for (const contentId of contentIds) {
                try {
                    const post = await db.get(contentId);
                    if (post) {
                        const visibilityClass = post.visibility === 'public' ? 'badge-public' :
                                               (post.visibility === 'circle' ? 'badge-circle' : 'badge-private');
                        contentHtml += `
                            <div class="content-item">
                                <div class="content-title">${escapeHtml(post.title)}</div>
                                <div class="content-meta">
                                    <span class="badge ${visibilityClass}" style="font-size: 10px;">${post.visibility}</span>
                                    <span style="margin-left: 10px;">📅 ${new Date(post.createdAt).toLocaleDateString()}</span>
                                </div>
                                <div class="content-body">${escapeHtml(post.content)}</div>
                            </div>
                        `;
                    }
                } catch (e) {
                    console.warn("Could not load post:", contentId);
                }
            }
            
            if (contentHtml) {
                container.innerHTML = contentHtml;
            } else {
                container.innerHTML = '<p style="color: #999; text-align: center;">No posts loaded</p>';
            }
        }
        
        // Discover other peers on the network
        async function discoverPeers() {
            try {
                // Query for all public profiles (excluding self)
                const allNodes = await db.query({
                    selector: {
                        id: { $regex: "^profile_" }
                    }
                });
                
                const discoveredPeers = [];
                for (const node of allNodes) {
                    if (node.value && node.value.peerId !== currentPeerId) {
                        discoveredPeers.push(node.value);
                        allPeers.set(node.value.peerId, node.value);
                    }
                }
                
                // Update peer discovery UI
                const peerListEl = document.getElementById("peerList");
                if (discoveredPeers.length === 0) {
                    peerListEl.innerHTML = '<p style="color: #999; text-align: center;">🌐 No other peers found. Share this app with friends!</p>';
                } else {
                    let peersHtml = '';
                    for (const peer of discoveredPeers) {
                        const alreadyInCircle = currentUser?.circle?.some(m => m.peerId === peer.peerId);
                        peersHtml += `
                            <div class="circle-item">
                                <div>
                                    <strong>${escapeHtml(peer.name || 'Anonymous')}</strong>
                                    <div class="peer-id">${peer.peerId.slice(0, 20)}...</div>
                                </div>
                                ${!alreadyInCircle ? 
                                    `<button onclick="window.quickAddPeer('${peer.peerId}')" style="padding: 5px 12px; font-size: 12px;">Add ➕</button>` :
                                    `<span class="badge badge-view" style="background: #ccc;">In Circle ✓</span>`
                                }
                            </div>
                        `;
                    }
                    peerListEl.innerHTML = peersHtml;
                }
                
                document.getElementById("peerCount")?.setAttribute?.("data-count", discoveredPeers.length);
                
            } catch (error) {
                console.log("Peer discovery:", error.message);
            }
        }
        
        // Quick add peer from discovery list
        window.quickAddPeer = async function(peerId) {
            document.getElementById("peerId").value = peerId;
            await addToCircle();
        };
        
        // Add a peer to your circle
        window.addToCircle = async function() {
            const peerId = document.getElementById("peerId").value.trim();
            const permission = document.getElementById("permissionLevel").value;
            
            if (!peerId) {
                updateStatus("Please enter a Peer ID", "error");
                return;
            }
            
            if (peerId === currentPeerId) {
                updateStatus("You cannot add yourself to your circle", "error");
                return;
            }
            
            // Check if already in circle
            if (currentUser.circle.some(m => m.peerId === peerId)) {
                updateStatus("This peer is already in your circle", "error");
                return;
            }
            
            // Add to circle
            currentUser.circle.push({
                peerId: peerId,
                permissions: permission,
                addedAt: new Date().toISOString()
            });
            
            await db.put(currentUser);
            document.getElementById("peerId").value = "";
            updateStatus(`✅ Added ${peerId.slice(0, 12)}... to your circle with ${permission} permissions`, "success");
            await updateCircleList();
        };
        
        // Share new content/post
        window.shareContent = async function() {
            const title = document.getElementById("postTitle").value.trim();
            const content = document.getElementById("postContent").value.trim();
            const visibility = document.getElementById("shareWith").value;
            
            if (!title || !content) {
                updateStatus("Please enter both title and content", "error");
                return;
            }
            
            try {
                const post = {
                    type: "post",
                    title: title,
                    content: content,
                    authorPeerId: currentPeerId,
                    authorName: currentUser.name,
                    visibility: visibility,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                
                const postId = await db.put(post);
                
                // Add to user's content list
                currentUser.content.push(postId);
                await db.put(currentUser);
                
                // Clear form
                document.getElementById("postTitle").value = "";
                document.getElementById("postContent").value = "";
                
                updateStatus(`📢 "${title}" shared with ${visibility} visibility!`, "success");
                await updateContentList();
                
            } catch (error) {
                console.error("Share error:", error);
                updateStatus("Failed to share: " + error.message, "error");
            }
        };
        
        // Edit user profile
        window.editProfile = async function() {
            const newName = prompt("Enter your display name:", currentUser.name);
            const newBio = prompt("Enter your bio:", currentUser.bio || "");
            
            if (newName) currentUser.name = newName;
            if (newBio) currentUser.bio = newBio;
            
            await db.put(currentUser);
            document.getElementById("profileName").innerText = currentUser.name;
            updateStatus("Profile updated successfully!", "success");
        };
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Set up reactive subscriptions for real-time updates
        async function setupSubscriptions() {
            // Subscribe to profile changes for circle members
            const profileQuery = { selector: { id: { $regex: "^profile_" } } };
            
            await db.map(profileQuery, async ({ id, value, action }) => {
                if (value && value.peerId !== currentPeerId) {
                    // A peer's profile was updated - refresh UI if needed
                    if (currentUser?.circle?.some(m => m.peerId === value.peerId)) {
                        // Refresh circle list to show updated names
                        await updateCircleList();
                    }
                    // Update peer discovery
                    await discoverPeers();
                }
            });
            
            // Periodically discover peers
            setInterval(async () => {
                if (db && currentPeerId) {
                    await discoverPeers();
                }
            }, 15000);
        }
        
        // Initialize the entire application
        async function initApp() {
            try {
                updateStatus("🚀 Initializing P2P Network...", "info");
                
                // Initialize GenosDB with RTC enabled - from official docs [citation:4][citation:5][citation:8]
                db = await gdb("p2p-circles-app", { 
                    rtc: true  // Enables WebRTC peer-to-peer communication
                });
                
                updateStatus("🔗 Connected to P2P network", "info");
                
                // Get the current peer ID
                currentPeerId = getCurrentPeerId();
                updateStatus(`🆔 Your Peer ID: ${currentPeerId.slice(0, 16)}...`, "success");
                
                // Get or create user profile
                currentUser = await getOrCreateProfile(currentPeerId);
                
                // Set up real-time subscriptions
                await setupSubscriptions();
                
                // Update UI
                await updateUI();
                
                // Start peer discovery
                await discoverPeers();
                
                updateStatus("✅ Ready! Your P2P circle is active.", "success");
                setTimeout(() => {
                    const statusEl = document.getElementById("status");
                    if (statusEl) statusEl.style.display = "none";
                }, 4000);
                
            } catch (error) {
                console.error("Initialization failed:", error);
                updateStatus(`❌ Failed to initialize: ${error.message}`, "error");
            }
        }
        
        // Make functions available globally for onclick handlers
        window.addToCircle = addToCircle;
        window.shareContent = shareContent;
        window.editProfile = editProfile;
        window.quickAddPeer = quickAddPeer;
        
        // Start the app
        initApp();
    </script>
</body>
</html>
